<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WhatsApp Clone - تطبيق محادثات فوري">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WhatsApp Clone">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#00A884">
  <link rel="manifest" href="manifest.json">
  <title>WhatsApp Clone</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #111B21; }
    html, body, #root { height: 100%; overflow: hidden; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; color: #8696A0; }
    .spinner { width: 40px; height: 40px; border: 4px solid #313D45; border-top-color: #00A884; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #recaptcha-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999999; }
  </style>
</head>
<body>
  <div id="recaptcha-container"></div>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>جاري التحميل...</span>
    </div>
  </div>
  <script>
  window._phoneAuth = {
    _confirmationResult: null,
    sendOtp: function(phone) {
      var self = this;
      try {
        var verifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          'size': 'normal',
          'callback': function() { console.log('reCAPTCHA solved'); }
        });
        return firebase.auth().signInWithPhoneNumber(phone, verifier)
          .then(function(result) {
            self._confirmationResult = result;
            return result.verificationId;
          })
          .catch(function(e) { throw new Error(e.message); });
      } catch(e) { return Promise.reject(new Error(e.message)); }
    },
    verifyOtp: function(code) {
      if (!this._confirmationResult) return Promise.reject(new Error('لم يتم إرسال الرمز'));
      return this._confirmationResult.confirm(code)
        .then(function(r) { return r.user.uid; })
        .catch(function(e) { throw new Error(e.message); });
    }
  };
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
