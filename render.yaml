services:
  - type: web
    name: whats-maher
    runtime: image
    repo: https://github.com/mahoora/whatsapp-clone
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '5000'
      - key: MONGODB_URI
        fromDatabase:
          name: whats-maher-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

databases:
  - name: whats-maher-db
    plan: free
    region: frankfurt
    databaseName: whats-maher
    ipAllowList: []
