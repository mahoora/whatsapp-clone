name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-web
      - name: Analyze
        run: flutter analyze 2>&1 | tee analyze_output.txt
        continue-on-error: true
      - name: Show analyze
        run: cat analyze_output.txt
      - name: Build web
        run: flutter build web --release 2>&1 | tee build_output.txt
        continue-on-error: true
      - name: Show build errors
        run: |
          awk 'BEGIN{IGNORECASE=1}/error/{print "::error file=build_output.txt,line="NR"::"$0}' build_output.txt
          echo "=== LAST 50 ===" && tail -50 build_output.txt
      - name: Check output
        run: ls build/web/index.html && wc -c build/web/index.html
      - name: Set base href
        run: sed -i 's|<base href="/">|<base href="/whatsapp-clone/">|' build/web/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4