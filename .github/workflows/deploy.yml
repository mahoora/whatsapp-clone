name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - name: Create simple test
        run: | 
          mkdir -p /tmp/testweb
          cd /tmp/testweb
          echo 'void main() { print("hello"); }' > main.dart
          dart compile js main.dart -o main.js 2>&1 || echo "dart2js failed"
      - run: flutter analyze
      - name: Build web
        id: buildweb
        run: |
          flutter build web --release 2>&1 | tee build_output.txt
      - name: Check build
        run: |
          if [ -f build/web/index.html ]; then
            echo "Build SUCCESS - index.html found"
          else
            echo "Build FAILED - no index.html"
          fi
      - name: Show last 80 lines of build output
        run: tail -80 build_output.txt || echo "No build output"
      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
