name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-web
      - run: flutter analyze > analyze_output.txt 2>&1 || true; cat analyze_output.txt
      - run: set -o pipefail; flutter build web --release --base-href /whatsapp-clone/ 2>&1 | tee build_log.txt; tail -30 build_log.txt
      - name: Check build output
        run: |
          echo "=== build/web/ ===" && ls -la build/web/ 2>&1 || echo "NOT FOUND"
          echo "=== build/ ===" && ls -la build/ 2>&1 || echo "build/ NOT FOUND"
          echo "=== Any index.html ===" && find . -name "index.html" -type f 2>/dev/null
          echo "=== Any .html ===" && find . -name "*.html" -type f 2>/dev/null | head -20
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
