name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-web
      - run: flutter analyze > analyze_output.txt 2>&1 || true; cat analyze_output.txt
      - run: flutter build web --release --base-href /whatsapp-clone/ 2>&1 | tee build_log.txt; echo "---LAST 30 LINES---"; tail -30 build_log.txt
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
