name: whatsapp_clone
description: واتساب كلون - تطبيق محادثات فوري مبني بـ Flutter + Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  provider: ^6.1.2
  intl: ^0.20.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true